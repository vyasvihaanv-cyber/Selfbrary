<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Selfbrary</title>
</head>
<body>
    <div class="container">
        <header>
            <h1>My Personal Library</h1>
        </header>
        <main>
            <section id="book-form">
                <h2>Add a Book</h2>
                <input type="text" id="title" placeholder="Book Title" required>
                <input type="text" id="author" placeholder="Author" required>
                <select id="status">
                    <option value="want-to-read">Want to Read</option>
                    <option value="reading">Reading</option>
                    <option value="completed">Completed</option>
                </select>
                <input type="number" id="rating" min="0" max="5" step="0.1" placeholder="Rating (0-5)">
                <button id="add-book">Add Book</button>
            </section>
            <section id="book-list">
                <h2>Your Books</h2>
                <input type="text" id="search" placeholder="Search..." oninput="filterBooks()">
                <div id="books"></div>
            </section>
        </main>
        <footer>
            <p>&copy; 2026 Selfbrary</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
